<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClientFlow</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #007bff; }
        button { padding: 10px; margin: 5px; }
        .card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; }
    </style>
</head>

    <h1>ClientFlow - CRM</h1>
    
    <h2>Клиенты</h2>
    <input id="client" placeholder="Имя клиента">
    <button onclick="addClient()">Добавить</button>
    <div id="client-list"></div>

    <h2>Проекты</h2>
    <input id="project" placeholder="Название проекта">
    <button onclick="addProject()">Добавить</button>
    <div id="project-list"></div>

    <h2>Задачи</h2>
    <input id="task" placeholder="Название задачи">
    <button onclick="addTask()">Добавить</button>
    <div id="task-list"></div>

    <script>
        function addClient() {
            const name = document.getElementById("client").value;
            if (name) {
                document.getElementById("client-list").innerHTML += `<div class="card">👤 ${name}</div>`;
                document.getElementById("client").value = "";
            }
        }

            }
        }
