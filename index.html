<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClientFlow</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f0f0f0; }
        h1 { color: #007bff; }
        button { padding: 10px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 5px; }
        input { padding: 10px; width: 300px; }
        .card { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>ClientFlow</h1>
    
    <h2>Клиенты</h2>
    <input id="client" placeholder="Имя клиента">
    <button onclick="addClient()">Добавить</button>
    <div id="client-list"></div>

    <script>
        let clients = JSON.parse(localStorage.getItem("clients")) || [];

        function render() {
            document.getElementById("client-list").innerHTML = clients.map(c => `<div class="card">👤 ${c}</div>`).join("");
        }

        function addClient() {
            const name = document.getElementById("client").value.trim();
            if (name) {
                clients.push(name);
                localStorage.setItem("clients", JSON.stringify(clients));
                render();
                document.getElementById("client").value = "";
            }
        }

        render();
    </script>
</body>
</html>
