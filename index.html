!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClientFlow - CRM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>ClientFlow</h1>
        <p>CRM для фрилансеров</p>
    </div>
    <div class="nav">
        <button onclick="showSection('clients')">Клиенты</button>
        <button onclick="showSection('projects')">Проекты</button>
        <button onclick="showSection('tasks')">Задачи</button>
    </div>
    <div class="content">
        <div id="clients" class="section"></div>
        <div id="projects" class="section" style="display:none;"></div>
        <div id="tasks" class="section" style="display:none;"></div>
    </div>

    <script src="storage.js"></script>
    <script src="clients.js"></script>
    <script src="projects.js"></script>
    <script src="tasks.js"></script>
    <script src="statistics.js"></script>
    <script src="app.js"></script>
</body>
</html>
