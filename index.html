<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClientFlow - CRM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            padding: 24px;
            text-align: center;
            border-radius: 20px 20px 0 0;
        }
        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            background: rgba(15, 23, 42, 0.8);
            padding: 8px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        .nav button {
            flex: 1;
            padding: 14px;
            background: transparent;
            color: #e2e8f0;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav button.active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .section {
            background: rgba(15, 23, 42, 0.95);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .card {
            background: rgba(30, 41, 59, 0.8);
            padding: 20px;
            margin: 12px 0;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: white;
            padding: 14px;
            border-radius: 12px;
            width: 70%;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        button:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        .delete-btn {
            background: #ef4444;
        }
        .stats {
            background: rgba(30, 41, 59, 0.8);
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ClientFlow</h1>
            <p>Современная CRM для фрилансеров 2026</p>
        </div>
        <div class="nav">
            <button onclick="showSection('clients')" class="active">Клиенты</button>
            <button onclick="showSection('projects')">Проекты</button>
            <button onclick="showSection('tasks')">Задачи</button>
        </div>
        <div class="stats" id="stats">Клиентов: 0 | Проектов: 0 | Задач: 0</div>
        
        <div id="clients" class="section">
            <h2>Клиенты</h2>
            <input type="text" id="client-name" placeholder="Имя клиента">
            <button


ck="addClient()">Добавить</button>
            <div id="clients-list"></div>
        </div>
        <div id="projects" class="section" style="display:none;">
            <h2>Проекты</h2>
            <input type="text" id="project-name" placeholder="Название проекта">
            <button onclick="addProject()">Добавить</button>
            <div id="projects-list"></div>
        </div>
        <div id="tasks" class="section" style="display:none;">
            <h2>Задачи</h2>
            <input type="text" id="task-name" placeholder="Название задачи">
            <button onclick="addTask()">Добавить</button>
            <div id="tasks-list"></div>
        </div>
    </div>

    <script>
        let clients = JSON.parse(localStorage.getItem("clients")) || [];
        let projects = JSON.parse(localStorage.getItem("projects")) || [];
        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(section).style.display = 'block';
            updateStats();
        }

        function updateStats() {
            document.getElementById("stats").innerHTML = `Клиентов: ${clients.length} | Проектов: ${projects.length} | Задач: ${tasks.length}`;
        }

        function addClient() {
            const name = document.getElementById("client-name").value.trim();
            if (name) {
                clients.push(name);
                localStorage.setItem("clients", JSON.stringify(clients));
                renderClients();
                document.getElementById("client-name").value = "";
                updateStats();
            }
        }

        function renderClients() {
            const list = document.getElementById("clients-list");
            list.innerHTML = clients.map((c, i) => `<div class="card">👤 ${c} <button class="delete-btn" onclick="deleteClient(${i})">Удалить</button></div>`).join("");
        }

        function deleteClient(i) {
            clients.splice(i, 1);
            localStorage.setItem("clients", JSON.stringify(clients));
            renderClients();
            updateStats();
        }

        function addProject() {
            const name = document.getElementById("project-name").value.trim();
            if (name) {
                projects.push(name);
                localStorage.setItem("projects", JSON.stringify(projects));
                renderProjects();
                document.getElementById("project-name").value = "";
                updateStats();
            }
        }

        function renderProjects() {
            const list = document.getElementById("projects-list");
            list.innerHTML = projects.map((p, i) => `<div class="card">📁 ${p} <button class="delete-btn" onclick="deleteProject(${i})">Удалить</button></div>`).join("");
        }

        function deleteProject(i) {
            projects.splice(i, 1);
            localStorage.setItem("projects", JSON.stringify(projects));
            renderProjects();
            updateStats();
        }

        function addTask() {
            const name = document.getElementById("task-name").value.trim();
            if (name) {
                tasks.push(name);
                localStorage.setItem("tasks", JSON.stringify(tasks));
                renderTasks();
                document.getElementById("task-name").value = "";
                updateStats();
            }
        }

        function renderTasks() {
            const list = document.getElementById("tasks-list");
            list.innerHTML = tasks.map((t, i) => `<div class="card">📋 ${t} <button class="delete-btn" onclick="deleteTask(${i})">Удалить</button></div>`).join("");
        }

        function deleteTask(i) {
            tasks.splice(i, 1);
            localStorage.setItem("tasks", JSON.stringify(tasks));
            renderTasks();
            updateStats();
        }

        showSection('clients');
    </script>
</body>
</html> oncli
